<title>DQDTI - 球星人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#fdf6ec;color:#3a2f2f;min-height:100vh;min-height:100dvh;overflow-x:hidden}
.ct{max-width:500px;margin:0 auto;padding:16px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1}
.sc{display:none;animation:fi .6s ease}.sc.on{display:flex;flex-direction:column;align-items:center}
@keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fl{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(3deg)}}
.bg-doodle{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.05}
/* logo */
.logo{display:flex;align-items:center;gap:8px;margin-bottom:16px;justify-content:center}
.logo img{width:40px;height:40px;border-radius:10px}
.logo-t{font-size:17px;font-weight:800;color:#2E7D32;letter-spacing:1px}
.logo-t small{color:#8a7a6a;font-weight:400;font-size:10px;display:block;letter-spacing:0}
/* welcome */
.hero{font-size:64px;margin-bottom:6px;animation:fl 3s ease-in-out infinite;filter:drop-shadow(2px 4px 0 rgba(0,0,0,.1))}
h1{font-size:28px;color:#2E7D32;font-weight:900;letter-spacing:3px;text-shadow:2px 2px 0 rgba(76,175,80,.12)}
.ver{font-size:16px;color:#ff7043;font-weight:700;margin:4px 0 10px;letter-spacing:3px}
.sub{color:#7a6a5a;font-size:13px;text-align:center;line-height:2;margin-bottom:24px}
.btn{background:#4CAF50;color:#fff;border:3px solid #2E7D32;padding:13px 48px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:3px;box-shadow:4px 4px 0 #2E7D32;-webkit-appearance:none}
.btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #2E7D32}
.cnt{color:#baa;font-size:11px;margin-top:18px}
/* quiz */
.bar{width:100%;height:6px;background:#e8ddd0;border-radius:20px;margin-bottom:20px;overflow:hidden;border:1.5px solid #d4c4b0}
.bar-f{height:100%;background:linear-gradient(90deg,#4CAF50,#81C784);transition:width .4s;border-radius:20px}
.qn{color:#4CAF50;font-size:12px;margin-bottom:6px;letter-spacing:2px;font-weight:700}
.qt{font-size:17px;text-align:center;line-height:1.7;margin-bottom:20px;font-weight:600;color:#3a2f2f;padding:14px 12px;background:#fff;border-radius:18px;border:2px dashed #d4c4b0;position:relative}
.qt::before{content:'Q';position:absolute;top:-11px;left:16px;background:#ff7043;color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #e64a19}
.ops{width:100%;display:flex;flex-direction:column;gap:8px}
.op{background:#fff;border:2px solid #e0d5c8;border-radius:16px;padding:12px 14px 12px 44px;cursor:pointer;transition:all .2s;font-size:13.5px;line-height:1.6;text-align:left;position:relative;box-shadow:2px 2px 0 #e0d5c8}
.op:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #c8e6c9;border-color:#4CAF50;background:#f0faf0}
.ol{position:absolute;left:0;top:0;bottom:0;width:38px;display:flex;align-items:center;justify-content:center;background:#f0faf0;font-weight:700;color:#4CAF50;font-size:12px;border-radius:14px 0 0 14px;border-right:2px dashed #c8e6c9}
/* ---- MBTI Result ---- */
.rc{background:#fff;border-radius:22px;padding:24px 16px 26px;width:100%;text-align:center;border:3px solid #e0d5c8;box-shadow:4px 4px 0 #e0d5c8;position:relative;overflow:hidden}
.mbti-code{display:flex;justify-content:center;gap:5px;margin:8px 0 4px}
.mbti-letter{display:flex;flex-direction:column;align-items:center}
.mbti-letter .letter{font-size:34px;font-weight:900;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;border:2px solid rgba(0,0,0,.1);box-shadow:2px 2px 0 rgba(0,0,0,.08)}
.mbti-letter .label{font-size:9px;color:#8a7a6a;margin-top:3px;letter-spacing:1px}
.tn{font-size:20px;color:#ff7043;margin:10px 0 6px;font-weight:700}
.td{font-size:13px;color:#6a5a4a;line-height:2;margin-bottom:14px;text-align:left;padding:10px 12px;background:#fdf6ec;border-radius:12px;border:2px dashed #e8ddd0}
.tg{margin:6px 0 12px;display:flex;flex-wrap:wrap;justify-content:center;gap:5px}
.tg span{background:#f0faf0;border:2px solid #c8e6c9;border-radius:20px;padding:3px 10px;font-size:11px;color:#2E7D32}
.dm{width:100%;margin:12px 0 16px}
.dr{display:flex;align-items:center;margin:7px 0;font-size:11px}
.dl{width:50px;text-align:right;font-weight:700;font-size:10px;padding-right:4px;white-space:nowrap}
.dri{width:50px;text-align:left;font-weight:700;font-size:10px;padding-left:4px;white-space:nowrap}
.dt{flex:1;height:10px;background:#f0ebe3;border-radius:20px;margin:0 3px;overflow:hidden;border:1.5px solid #e0d5c8}
.df{height:100%;border-radius:20px;transition:width .8s}
.ms{display:flex;gap:8px;margin-top:12px}
.mb{flex:1;background:#fdf6ec;border-radius:14px;padding:12px 6px;text-align:center;border:2px solid #e8ddd0}
.mi{font-size:30px;margin-bottom:3px}
.ml{font-size:9px;color:#8a7a6a;letter-spacing:1px;margin-bottom:2px}
.mn{font-size:14px;font-weight:700;color:#3a2f2f}.mr{font-size:10px;color:#8a7a6a;margin-top:2px}
.btns{display:flex;gap:8px;margin-top:16px;width:100%}
.sb{flex:1;padding:12px 0;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:none;-webkit-appearance:none}
.sb:active{transform:translate(1px,1px)}
.sb-save{background:#4CAF50;color:#fff;border:3px solid #2E7D32 !important;box-shadow:3px 3px 0 #2E7D32}
.sb-re{background:#fff;border:3px solid #e0d5c8 !important;color:#8a7a6a;margin-top:8px;width:100%;padding:10px;border-radius:50px;font-size:12px;cursor:pointer;transition:all .2s;box-shadow:2px 2px 0 #e0d5c8;-webkit-appearance:none}
.sb-re:active{border-color:#4CAF50 !important;color:#2E7D32}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#4CAF50;color:#fff;padding:10px 24px;border-radius:50px;font-size:13px;font-weight:600;transition:transform .4s;z-index:99;pointer-events:none;border:2px solid #2E7D32}
.toast.show{transform:translateX(-50%) translateY(0)}
.unlock-wrap{position:relative;margin-top:8px}
.unlock-content{position:relative;z-index:1;filter:blur(2px);pointer-events:none;user-select:none;opacity:.85}
.unlock-overlay{position:absolute;left:0;top:0;right:0;bottom:0;z-index:3;display:flex;align-items:flex-start;justify-content:center;padding-top:14px;background:linear-gradient(180deg,rgba(253,246,236,.96),rgba(253,246,236,.92));border-radius:14px}
.unlock-panel{width:calc(100% - 16px);background:#fff5e8;border:2px solid #f6c99d;border-radius:14px;padding:12px 10px;text-align:center;box-shadow:2px 2px 0 #f6c99d}
.unlock-title{font-size:14px;font-weight:800;color:#d35400;letter-spacing:1px}
.unlock-desc{font-size:12px;color:#8a5a2a;margin-top:6px;line-height:1.5}
.unlock-btn{margin-top:8px;background:#ff7043;color:#fff;border:2px solid #e64a19;border-radius:999px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #e64a19;-webkit-appearance:none}
.unlock-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #e64a19}
.unlock-btn:disabled{opacity:.75;cursor:not-allowed}
.unlock-count{font-size:11px;color:#8a6a4a;margin-top:8px;min-height:16px}
.unlock-wrap.unlocked .unlock-overlay{display:none}
.unlock-wrap.unlocked .unlock-content{filter:none;pointer-events:auto;user-select:auto;opacity:1}
@media(max-width:380px){
  h1{font-size:24px}
  .hero{font-size:52px}
  .mbti-letter .letter{width:42px;height:42px;font-size:28px}
  .qt{font-size:15px;padding:12px 10px}
  .op{font-size:13px;padding:11px 12px 11px 40px}
  .ol{width:34px}
  .dl,.dri{width:44px;font-size:9px}
}
</style>

function rr(c,x,y,w,h,r,f,sk){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();if(f){c.fillStyle=f;c.fill()}if(sk)c.stroke()}
function wrapText(c,t,x,y,mw,lh){const w=t.split('');let ln='';for(let i=0;i<w.length;i++){const tl=ln+w[i];if(c.measureText(tl).width>mw&&ln){c.fillText(ln,x,y);ln=w[i];y+=lh}else ln=tl}c.fillText(ln,x,y)}

        'beta-n.dongqiudi.com':'https://beta-ap.dongqiudi.com/plat/v3',
        'n.dongqiudi.com':'https://ap.dongqiudi.com/plat/v3',
        '10.18.7.0':'https://beta-ap.dongqiudi.com/plat/v3'
      },
      fallbackUrl:'https://ap.dongqiudi.com/plat/v3',
      param:{pgid:'1.15.2'}
    }
  },
  reward:{reward_name:'coin',reward_amount:'1',data:'',pgid:'1.15.2'}
};

const REWARD_STATE={
  ready:false,
  initing:false,
  initDone:false,
  currentPayload:null,
  preloadedAt:0,
  unlockTimer:null,
  unlocking:false,
  unlocked:false,
  preloadWeak:false
};

function rwLog(title,data){
  try{console.log('[DQDTI Reward]',title,data||'')}catch(e){}
}

function rwSafeParse(v){
  if(typeof v!=='string')return v;
  try{return JSON.parse(v)}catch(e){return v}
}

function rwError(code,message,detail){
  const e=new Error(message||code||'reward_error');
  e.code=code||'REWARD_ERROR';
  if(typeof detail!=='undefined')e.detail=detail;
  return e;
}

function rwStageError(stage,error,fallbackCode,fallbackMessage){
  const e=(error&&error.code)?error:rwError(fallbackCode||'REWARD_ERROR', (error&&error.message)||fallbackMessage||'reward error');
  if(!e.detail||typeof e.detail!=='object')e.detail={};
  if(!e.detail.stage)e.detail.stage=stage;
  return e;
}

function rwDetectPlatform(){
  const ua=(navigator.userAgent||'').toLowerCase();
  if(/android/.test(ua))return 'android';
  if(/iphone|ipad|ipod|ios/.test(ua))return 'ios';
  return 'android';
}

function rwEnsureConnector(){
  if(window.connectWebViewJavascriptBridge)return;
  window.connectWebViewJavascriptBridge=function(callback){
    if(window.WebViewJavascriptBridge){
      if(!window.WebViewJavascriptBridge._messageHandler&&window.WebViewJavascriptBridge.init){
        window.WebViewJavascriptBridge.init(function(){});
      }
      callback(window.WebViewJavascriptBridge);
      return;
    }
    if(window.$bridge&&window.$bridge.callHandler){
      callback(window.$bridge);
      return;
    }
    document.addEventListener('WebViewJavascriptBridgeReady',function(){
      if(window.WebViewJavascriptBridge&&!window.WebViewJavascriptBridge._messageHandler&&window.WebViewJavascriptBridge.init){
        window.WebViewJavascriptBridge.init(function(){});
      }
      callback(window.WebViewJavascriptBridge||window.$bridge||null);
    },false);
    if(window.WVJBCallbacks){window.WVJBCallbacks.push(callback);return;}
    window.WVJBCallbacks=[callback];
    const iframe=document.createElement('iframe');
    iframe.style.display='none';
    iframe.src='https://__bridge_loaded__';
    document.documentElement.appendChild(iframe);
    setTimeout(()=>{if(iframe.parentNode)iframe.parentNode.removeChild(iframe);},0);
  };
}

function rwGetBridge(timeoutMs){
  const timeout=Number(timeoutMs)||REWARD_CFG.bridgeDetectTimeout;
  return new Promise((resolve,reject)=>{
    let done=false;
    rwEnsureConnector();
    const timer=setTimeout(()=>{
      if(done)return;done=true;
      reject(rwError('REWARD_BRIDGE_NOT_READY','未检测到可用的 WebView bridge',{timeout}));
    },timeout);
    window.connectWebViewJavascriptBridge(function(bridge){
      if(done)return;done=true;clearTimeout(timer);
      if(bridge&&bridge.callHandler){resolve(bridge);return;}
      reject(rwError('REWARD_BRIDGE_NO_CALL_HANDLER','bridge 已就绪，但没有 callHandler'));
    });
  });
}

async function rwEnsureReady(){
  const start=Date.now();
  let lastErr=null;
  while(Date.now()-start<REWARD_CFG.readyRetryTimeout){
    try{
      await rwGetBridge(Math.min(REWARD_CFG.bridgeDetectTimeout,Math.max(300,REWARD_CFG.readyRetryInterval)));
      REWARD_STATE.ready=true;
      return;
    }catch(e){
      lastErr=e;
      await new Promise(r=>setTimeout(r,REWARD_CFG.readyRetryInterval));
    }
  }
  throw rwError('REWARD_BRIDGE_NOT_READY','bridge 在重试窗口内未就绪',{lastError:lastErr&&lastErr.message});
}

function rwResolveAdRequest(platform){
  const cfg=REWARD_CFG.adRequest[platform];
  const hostname=location&&location.hostname?location.hostname:'';
  const param=Object.assign({},cfg.param||{});
  const url=(cfg.urlMap&&cfg.urlMap[hostname])||cfg.fallbackUrl;
  param.pgid=REWARD_CFG.reward.pgid||param.pgid||'1.15.2';
  if(platform==='ios'){
    param.os='ios';
    if(!param.platform)param.platform='1';
    if(!param.position)param.position='0';
  }
  return {
    method:(cfg.method||'get').toLowerCase(),
    url:url,
    param:param,
    callback:'onUnifiedAdRequestDone'
  };
}

async function rwCallHandler(name,data,options){
  const bridge=await rwGetBridge(REWARD_CFG.bridgeDetectTimeout);
  const opts=options||{};
  const timeoutMs=Number(opts.timeout)||REWARD_CFG.callbackTimeout;
  const allowTimeout=!!opts.allowTimeout;
  return new Promise((resolve,reject)=>{
    let done=false;
    const timer=setTimeout(()=>{
      if(done)return;done=true;
      if(allowTimeout){
        resolve({__timeout:true});
        return;
      }
      reject(rwError('REWARD_CALLBACK_TIMEOUT',name+' 回调超时'));
    },timeoutMs);
    try{
      bridge.callHandler(name,data||{},function(response){
        if(done)return;done=true;clearTimeout(timer);
        resolve(response);
      });
    }catch(e){
      if(done)return;done=true;clearTimeout(timer);
      reject(rwError('REWARD_CALL_FAILED',e&&e.message?e.message:'callHandler 失败'));
    }
  });
}

function rwFindRewardItem(body){
  const list=body&&body.data;
  if(!Array.isArray(list))return null;
  for(let i=0;i<list.length;i++){
    if(list[i]&&list[i].ad_type==='sdk_rewarded_video')return list[i];
  }
  return null;
}

function rwBuildPayload(platform,adItem){
  const adSource=adItem&&adItem.ad_source?adItem.ad_source:{};
  const sdkId=adSource.sdk_position_id||adItem.sdk_id;
  if(!sdkId)throw rwError('REWARD_PAYLOAD_BUILD_FAILED','广告配置缺少 sdk_id');

  const origin=(adItem.origin||adSource.sdk_origin||adSource.sdk_name||(platform==='android'?'tobid':'topon')||'topon').toString().toLowerCase();
  const pgid=REWARD_CFG.reward.pgid||adItem.pgid||'1.15.2';
  if(platform==='ios'){
    return {
      id:REWARD_CFG.sceneId,
      relate_id:REWARD_CFG.sceneId,
      sdk_id:sdkId,
      sdkId:sdkId,
      origin:origin,
      platform:origin,
      reward_name:REWARD_CFG.reward.reward_name,
      reward_amount:REWARD_CFG.reward.reward_amount,
      data:REWARD_CFG.reward.data,
      imp_mon_arr:Array.isArray(adItem.imp_mon_arr)?adItem.imp_mon_arr:[],
      click_mon_arr:Array.isArray(adItem.click_mon_arr)?adItem.click_mon_arr:[],
      pgid:pgid
    };
  }
  return {
    id:REWARD_CFG.sceneId,
    data:{},
    origin:origin,
    sdk_id:sdkId,
    sdkId:sdkId,
    imp_mon_arr:Array.isArray(adItem.imp_mon_arr)?adItem.imp_mon_arr:[],
    click_mon_arr:Array.isArray(adItem.click_mon_arr)?adItem.click_mon_arr:[],
    ct:'',
    pgid:pgid
  };
}

async function rwRequestPayloadOnly(){
  const platform=rwDetectPlatform();
  const req=rwResolveAdRequest(platform);
  let adResp;
  try{
    adResp=await rwCallHandler('adRequest',req);
  }catch(e){
    throw rwStageError('adRequest_call',e,'REWARD_AD_REQUEST_CALL_FAILED','adRequest 调用失败');
  }

  const body=rwSafeParse(adResp&&adResp._responseWrapedByNative?adResp._responseWrapedByNative:adResp);

  if(!body||typeof body!=='object')throw rwError('REWARD_AD_REQUEST_BAD_BODY','adRequest 返回体为空或格式错误',{stage:'adRequest_parse'});
  if(typeof body.code!=='undefined'&&Number(body.code)!==0){
    throw rwError('REWARD_AD_REQUEST_CODE_ERROR','adRequest code='+body.code,{stage:'adRequest_code',code:body.code});
  }

  const adItem=rwFindRewardItem(body);
  if(!adItem)throw rwError('REWARD_AD_ITEM_NOT_FOUND','adRequest 未返回 sdk_rewarded_video 广告位',{stage:'adRequest_item'});

  return {
    platform: platform,
    payload: rwBuildPayload(platform,adItem)
  };
}

async function rwRequestAndPreload(){
  const ret=await rwRequestPayloadOnly();
  const platform=ret.platform;
  const payload=ret.payload;

  REWARD_STATE.preloadWeak=false;
  try{
    const preResp=await rwCallHandler('preLoadVideo',payload,{
      timeout:REWARD_CFG.preloadCallbackTimeout||REWARD_CFG.callbackTimeout,
      allowTimeout:true
    });
    if(preResp&&preResp.__timeout){
      REWARD_STATE.preloadWeak=true;
      rwLog('preLoadVideo timeout, fallback to best-effort payload',{platform});
    }
  }catch(e){
    throw rwStageError('preLoadVideo_call',e,'REWARD_PRELOAD_FAILED','preLoadVideo 调用失败');
  }

  REWARD_STATE.currentPayload=payload;
  REWARD_STATE.preloadedAt=Date.now();
  rwLog('request+preload success',{platform,payload,preloadWeak:REWARD_STATE.preloadWeak});
  return payload;
}

function rwHasFreshPayload(){
  return !!(REWARD_STATE.currentPayload&&Date.now()-REWARD_STATE.preloadedAt<=REWARD_CFG.preloadMaxAge);
}

async function rwShowWithCachedOrRequest(){
  let payload=REWARD_STATE.currentPayload;
  if(!rwHasFreshPayload()){
    const ret=await rwRequestPayloadOnly();
    payload=ret.payload;
    REWARD_STATE.currentPayload=payload;
    REWARD_STATE.preloadedAt=Date.now();
    REWARD_STATE.preloadWeak=true;
    rwLog('show path use adRequest-only payload', { platform: ret.platform });
  }
  if(!payload)throw rwError('REWARD_PAYLOAD_MISSING','缺少可用 payload',{stage:'connectVideo_payload'});
  try{
    await rwCallHandler('connectVideo',payload);
  }catch(e){
    throw rwStageError('connectVideo_call',e,'REWARD_SHOW_FAILED','connectVideo 调用失败');
  }
}

async function initRewardOnEnter(){
  if(REWARD_STATE.initing||REWARD_STATE.initDone)return;
  REWARD_STATE.initing=true;
  try{
    await rwEnsureReady();
    await rwRequestAndPreload();
    REWARD_STATE.initDone=true;
    rwLog('init preload done');
    if(typeof window.resetAdLock==='function')window.resetAdLock();
  }catch(e){
    const stage=e&&e.detail&&e.detail.stage?e.detail.stage:'';
    const desc=document.getElementById('unlockDesc');
    const count=document.getElementById('unlockCount');
    if(desc)desc.textContent='预加载失败，点击重试';
    if(count)count.textContent=(e&&e.code?e.code:'REWARD_INIT_FAILED')+(stage?(' ['+stage+']'):'')+'：'+(e&&e.message?e.message:'未知错误');
    rwLog('init preload fail',{code:e&&e.code,message:e&&e.message,stage:stage});
  }finally{
    REWARD_STATE.initing=false;
  }
}

function stopUnlockCountdown(){
  if(REWARD_STATE.unlockTimer){
    clearInterval(REWARD_STATE.unlockTimer);
    REWARD_STATE.unlockTimer=null;
  }
}

function unlockAllContent(){
  stopUnlockCountdown();
  REWARD_STATE.unlocking=false;
  REWARD_STATE.unlocked=true;
  const wrap=document.getElementById('unlockWrap');
  const desc=document.getElementById('unlockDesc');
  const count=document.getElementById('unlockCount');
  const btn=document.getElementById('unlockBtn');
  if(wrap)wrap.classList.add('unlocked');
  if(desc)desc.textContent='已解锁全部内容';
  if(count)count.textContent='';
  if(btn){btn.disabled=true;btn.textContent='已解锁';}
  if(typeof toast==='function')toast('已解锁全部内容');
}

function startUnlockCountdown(sec){
  stopUnlockCountdown();
  let left=sec;
  const count=document.getElementById('unlockCount');
  const desc=document.getElementById('unlockDesc');
  const btn=document.getElementById('unlockBtn');
  if(desc)desc.textContent='视频观看中，达到 8s 后自动解锁';
  if(btn){btn.disabled=true;btn.textContent='观看中...';}
  if(count)count.textContent='剩余 '+left+'s';
  REWARD_STATE.unlockTimer=setInterval(()=>{
    left-=1;
    if(count)count.textContent='剩余 '+Math.max(left,0)+'s';
    if(left<=0)unlockAllContent();
  },1000);
}

async function unlockByAd(){
  if(REWARD_STATE.unlocked||REWARD_STATE.unlocking)return;
  const btn=document.getElementById('unlockBtn');
  const desc=document.getElementById('unlockDesc');
  const count=document.getElementById('unlockCount');
  try{
    REWARD_STATE.unlocking=true;
    if(btn){btn.disabled=true;btn.textContent='加载视频...';}
    if(desc)desc.textContent='正在拉起激励视频，请稍候';
    if(count)count.textContent='';
    await rwEnsureReady();
    await rwShowWithCachedOrRequest();
    startUnlockCountdown(8);
    initRewardOnEnter();
  }catch(e){
    const stage=e&&e.detail&&e.detail.stage?e.detail.stage:'';
    REWARD_STATE.unlocking=false;
    if(btn){btn.disabled=false;btn.textContent='看激励视频解锁';}
    if(desc)desc.textContent='视频拉起失败，请稍后重试';
    if(count)count.textContent=(e&&e.code?e.code:'REWARD_UNLOCK_FAILED')+(stage?(' ['+stage+']'):'')+'：'+(e&&e.message?e.message:'未知错误');
    if(typeof toast==='function')toast('激励视频拉起失败');
    rwLog('unlock fail',{code:e&&e.code,message:e&&e.message,stage:stage});
  }
}

function resetAdLock(){
  stopUnlockCountdown();
  REWARD_STATE.unlocking=false;
  REWARD_STATE.unlocked=false;
  const wrap=document.getElementById('unlockWrap');
  const btn=document.getElementById('unlockBtn');
  const desc=document.getElementById('unlockDesc');
  const count=document.getElementById('unlockCount');
  if(!wrap)return;
  wrap.classList.remove('unlocked');
  if(btn){btn.disabled=false;btn.textContent='看激励视频解锁';}
  if(desc){
    if(rwHasFreshPayload()&&REWARD_STATE.preloadWeak){
      desc.textContent='预加载回调超时，点击将直接尝试拉起视频';
    }else{
      desc.textContent=rwHasFreshPayload()?'视频已预加载，点击即可观看':'进入页面已尝试预加载，点击即可观看';
    }
  }
  if(count)count.textContent='需观看 8s 后解锁';
}

window.unlockByAd=unlockByAd;
window.resetAdLock=resetAdLock;
window.addEventListener('load',function(){
  initRewardOnEnter();
  setTimeout(initRewardOnEnter,1200);
  setTimeout(initRewardOnEnter,3000);
});
window.addEventListener('pageshow',function(){
  if(!REWARD_STATE.initDone)initRewardOnEnter();
});
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&!REWARD_STATE.initDone){
    initRewardOnEnter();
  }
});
</script>
